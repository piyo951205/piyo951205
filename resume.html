<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人履歷</title>

<style>
body{
    font-family: "Segoe UI", sans-serif;
    background:#f5f6f7;
    margin:0;
}

.resume{
    width:800px;
    margin:40px auto;
    background:white;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
    border-radius:10px;
    overflow:hidden;
}

.top{
    background:#e9ecef;
    padding:30px;
    display:flex;
    align-items:center;
}

.photo{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    margin-right:25px;
    border:4px solid white;
}

.info h1{
    margin:0;
    font-size:28px;
}

.info p{
    margin:5px 0;
    color:#555;
}

.section{
    padding:25px 30px;
    border-bottom:1px solid #eee;
}

.section h2{
    margin-bottom:10px;
    color:#333;
}

ul{
    margin:0;
    padding-left:20px;
}

button{
    padding:8px 15px;
    border:none;
    background:#4facfe;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#3a8de0;
}
</style>
</head>

<body>

<div class="resume">

    <div class="top">
        <img src="01.jpg" class="photo">
        <div class="info">
            <h1>王宥幃</h1>
            <p>亞洲大學學生</p>
            <p>學號：AU114024061</p>
            <p>Email：example@email.com</p>
            <p>電話：0907-959-825</p>
        </div>
    </div>

    <div class="section">
        <h2>學歷</h2>
        <ul>
            <li>亞洲大學 - 就讀中</li>
        </ul>
    </div>

    <div class="section">
        <h2>技能</h2>
        <ul>
            <li>HTML / CSS / JavaScript</li>
            <li>設計與影像處理</li>
        </ul>
    </div>

    <div class="section">
        <h2>自我介紹</h2>
        <p id="intro">請點擊按鈕輸入自我介紹</p>
        <button onclick="editIntro()">編輯自我介紹</button>
    </div>

</div>

<script>
function editIntro(){
    let text = prompt("請輸入自我介紹");
    if(text){
        document.getElementById("intro").innerText = text;
    }
}
</script>

</body>
</html>
