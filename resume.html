<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人履歷</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body{
    font-family: "Segoe UI", sans-serif;
    /* 改為柔和的漸層背景 */
    background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
    margin:0;
    min-height: 100vh;
}

.resume{
    width:800px;
    margin:40px auto;
    background:white;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
    border-radius:10px;
    overflow:hidden;
}

.top{
    background:#e9ecef;
    padding:30px;
    display:flex;
    align-items:center;
}

.photo{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    margin-right:25px;
    border:4px solid white;
}

.info h1{
    margin:0;
    font-size:28px;
}

.info p{
    margin:5px 0;
    color:#555;
}

.section{
    padding:25px 30px;
    border-bottom:1px solid #eee;
}

.section h2{
    margin-bottom:10px;
    color:#333;
}

ul{
    margin:0;
    padding-left:20px;
}

button{
    padding:8px 15px;
    border:none;
    background:#4facfe;
    color:white;
    border-radius:5px;
    cursor:pointer;
    /* 加入平滑動畫 */
    transition: all 0.3s ease;
}

button:hover{
    background:#3a8de0;
    /* 增加懸停時的小縮放 */
    transform: scale(1.05);
}

button:active {
    transform: scale(0.95);
}
</style>
</head>

<body>
    <audio id="bgm" autoplay loop playsinline>
  <source src="audio/music.mp3.mp3" type="audio/mpeg">
</audio>

<script>
  const audio = document.getElementById("bgm");

  // 嘗試直接播放
  audio.play().catch(() => {
    // 若被擋，快速解除靜音再播放
    audio.muted = true;
    audio.play();

    setTimeout(() => {
      audio.muted = false;
    }, 100);
  });
</script>

<div class="resume">

    <div class="top">
        <img src="photo.jpg.jpg" class="photo">
        <div class="info">
            <h1>王宥幃 👋</h1>
            <p>🎓 亞洲大學學生</p>
            <p>🆔 學號：AU114024061</p>
            <p><i class="fas fa-envelope"></i> Email：example@email.com</p>
            <p><i class="fas fa-phone"></i> 電話：0907-959-825</p>
        </div>
    </div>

    <div class="section">
        <h2>🎓 學歷</h2>
        <ul>
            <li>亞洲大學 - 就讀中</li>
        </ul>
    </div>

    <div class="section">
        <h2>🛠️ 技能</h2>
        <ul>
            <li><i class="fab fa-html5"></i> HTML / CSS / JavaScript</li>
            <li>🎨 設計與影像處理</li>
        </ul>
    </div>

    <div class="section">
        <h2>✨ 自我介紹</h2>
        <p id="intro">我是來自亞大一年級的學生，目前就讀資傳系，興趣是拍照 📸，希望可以脫單🍀 
            ig:levi_._._17</p>
        <button onclick="editIntro()">📝 ig:levi_._._17</button>
    </div>

</div>

<script>
function editIntro(){
    let text = prompt("請輸入自我介紹");
    if(text){
        document.getElementById("intro").innerText = text;
    }
}
</script>

</body>
</html>
